<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8 /" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Poem Generator</title>
  </head>

  <body>
    <h1>Welcome to the AI French Poem Generator</h1>

    <main>
      <form>
        <input
          type="text"
          placeholder="Enter the topic of the French poem"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" />
      </form>
      <div>
        La tombe dit à la rose
        <br />
        Des pleurs dont l'aube t'arrose
      </div>
    </main>

    <footer>
      This was coded by
      <a href="https://github.com/js-lonewolf" target="_blank">Livinda</a> and
      is
      <a
        href="https://github.com/js-lonewolf/french-poem-generator"
        target="_blank"
        >open-sourced on GitHub</a
      >
      and is hosted on Netlify
    </footer>

    <script src="src/index.js"></script>
  </body>
</html>
