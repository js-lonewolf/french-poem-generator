<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Poem Generator</title>
  </head>

  <body>
    <div class="container">
    <h1>Welcome to the AI French Poem Generator</h1>

    <main>
      <form id="poem-generator-form">
        <input
          type="text"
          placeholder="Enter the topic of the French poem"
          autofocus
          required
          autocomplete="off" 
          class="instructions"
          id= "user-instructions"
        />
        <input type="submit" class="submit-button"/>
      </form>
      <div class="poem" id="poem"></div>
</div>
    </main>

    <footer>
      This was coded by
      <a href="https://github.com/js-lonewolf" target="_blank">Livinda</a> and
      is
      <a
        href="https://github.com/js-lonewolf/french-poem-generator"
        target="_blank"
        >open-sourced on GitHub</a
      >
      and is hosted on Netlify
    </footer>

    <script src="src/index.js"></script>
  </body>
  </div>
</html>
